<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Map - Hangyu Zhou</title>
  <style>
    body {
      font-family: Verdana, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #fff;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .back-link {
      margin-bottom: 20px;
      font-size: 14px;
    }

    .back-link a {
      color: #007bff;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .map-container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
    }

    /* Scale down the 3200px widget to fit ~1000px, giving 3x+ resolution on retina */
    .map-scaler {
      width: 3200px;
      transform: scale(0.3125);
      transform-origin: top left;
    }

    @media (max-width: 850px) {
      .map-container {
        max-width: 100%;
        overflow: hidden;
      }

      .map-scaler {
        transform: scale(calc(50vw / 1600));
        transform-origin: top left;
      }
    }
  </style>
</head>

<body>
  <h1>Visitor Map</h1>
  <div class="back-link"><a href="index.html">&larr; Back to homepage</a></div>
  <div class="map-container">
    <div class="map-scaler">
      <script type='text/javascript' id='mapmyvisitors'
        src='https://mapmyvisitors.com/map.js?cl=777777&w=3200&t=n&d=NCtmPpXBb5jvZC6scJCH9XjYBcQ2pgp4uDpI4EXO_sA&co=ffffff&cmo=b5b5b5&cmn=afd5ff&ct=000000'></script>
    </div>
  </div>

  <script>
    // Fix the container height after widget loads since transform: scale doesn't shrink layout
    window.addEventListener('load', function () {
      setTimeout(function () {
        var scaler = document.querySelector('.map-scaler');
        var container = document.querySelector('.map-container');
        if (scaler && container) {
          var scale = parseFloat(getComputedStyle(scaler).transform.split(',')[3]) || 0.3125;
          container.style.height = (scaler.offsetHeight * scale) + 'px';
          container.style.overflow = 'hidden';
        }
      }, 2000);

      // Scale up visitor marker dots — use MutationObserver to persist through widget re-renders
      var MULTIPLIER = 4;
      var BASELINE = 6;
      var SCALED_ATTR = 'data-scaled';

      function scaleDots() {
        document.querySelectorAll('.jvectormap-marker, .mapmyvisitors-map svg circle[fill]').forEach(function (el) {
          if (el.getAttribute(SCALED_ATTR)) return;
          var r = parseFloat(el.getAttribute('r'));
          if (r && r > 0) {
            el.setAttribute('r', (r + BASELINE) * MULTIPLIER);
            el.setAttribute(SCALED_ATTR, '1');
          }
        });
      }

      // Run on initial load
      setTimeout(scaleDots, 3000);

      // Re-apply whenever the widget mutates the SVG
      var mapEl = document.querySelector('.map-scaler');
      if (mapEl) {
        new MutationObserver(function () {
          scaleDots();
        }).observe(mapEl, { childList: true, subtree: true, attributes: true, attributeFilter: ['r'] });
      }
  </style>
</body>

</html>
